  <!-- ============================ -->
  <!-- ADOBE TARGET PRE-HIDING SNIPPET -->
  <!-- This must load before Launch script to prevent FOOC (Flash of Original Content) -->
  <!-- ============================ -->
  <script>
   //prehiding snippet for Adobe Target with asynchronous tags deployment
   ;(function(win, doc, style, timeout) {
   var STYLE_ID = 'at-body-style';
   function getParent() {
      return doc.getElementsByTagName('head')[0];
   }
   function addStyle(parent, id, def) {
      if (!parent) {
      return;
      }
      var style = doc.createElement('style');
      style.id = id;
      style.innerHTML = def;
      parent.appendChild(style);
   }
   function removeStyle(parent, id) {
      if (!parent) {
      return;
      }
      var style = doc.getElementById(id);
      if (!style) {
      return;
      }
      parent.removeChild(style);
   }
   addStyle(getParent(), STYLE_ID, style);
   setTimeout(function() {
      removeStyle(getParent(), STYLE_ID);
   }, timeout);
   }(window, document, "body {opacity: 0 !important}", 3000));
  </script>

  <!-- ============================ -->
  <!-- DIGITAL DATA LAYER — SESSION RESTORE -->
  <!-- Runs synchronously before Launch so digitalData.user is populated -->
  <!-- when Library Loaded fires (handles hard reload while logged in)   -->
  <!-- ============================ -->
  <script>
    window.digitalData = window.digitalData || {};
    try {
      var _loggedIn = sessionStorage.getItem('travelwise_logged_in');
      var _userRaw  = sessionStorage.getItem('travelwise_user');
      if (_loggedIn === 'true' && _userRaw) {
        var _user = JSON.parse(_userRaw);
        window.digitalData.user = {
          isLoggedIn:          true,
          userId:              _user.userId,
          name:                _user.name,
          loyaltyTier:         _user.tier,
          memberSince:         _user.memberSince,
          totalBookings:       _user.totalBookings,
          favoriteDestination: _user.favoriteDestination
        };
      } else {
        window.digitalData.user = { isLoggedIn: false };
      }
    } catch (e) {
      window.digitalData.user = { isLoggedIn: false };
    }
  </script>

    window.travelwise = window.travelwise || {};

    window.travelwise.getEntityId = function(path) {
      if (path.startsWith('/destinations/')) {
        var slug = path.replace('/destinations/', '').replace(/\/$/, '');
        return ENTITY_MAP.destinations[slug] || null;
      }
      if (path.startsWith('/hotels/')) {
        var slug = path.replace('/hotels/', '').replace(/\/$/, '');
        return ENTITY_MAP.hotels[slug] || null;
      }
      return null;
    };

    window.travelwise.getPageType = function(path) {
      if (path === '/' || path === '/index.html') return 'home';
      if (path === '/destinations')               return 'destinations-list';
      if (path.startsWith('/destinations/'))      return 'destination-detail';
      if (path === '/hotels')                     return 'hotels-list';
      if (path.startsWith('/hotels/'))            return 'hotel-detail';
      if (path === '/about')                      return 'about';
      if (path === '/contact')                    return 'contact';
      return 'unknown';
    };
  </script>
